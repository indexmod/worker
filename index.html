<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod</title>

<link rel="icon" href="/logo.png">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: serif;
  display: flex;
}

.logo {
  position: fixed;
  top: 10px;
  left: 10px;
  height: 120px;
}

.sidebar {
  width: 220px;
  position: fixed;
  top: 140px;
  padding: 10px;
}

.main {
  margin-left: 220px;
  padding: 20px;
}

.editor {
  max-width: 800px;
  margin: 60px auto;
  outline: none;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="sidebar">
  <div id="pages">Loading...</div>
</div>

<div class="main">
  <div id="editor" class="editor" contenteditable="true"></div>
</div>

<script>
let path =
  new URLSearchParams(location.search).get("page") ||
  "home";

const editor = document.getElementById("editor");

marked.setOptions({ breaks: true });

async function loadPage() {
  const res = await fetch(`/api/page/${path}`);
  const text = await res.text();

  if (!text) {
    editor.innerHTML = "<h1>Untitled</h1>";
    return;
  }

  editor.innerHTML = marked.parse(text);
}

loadPage();

/* SAVE */
async function saveNow() {
  await fetch(`/api/page/${path}`, {
    method: "POST",
    body: editor.innerHTML
  });
}

/* SIDEBAR */
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML =
    pages.map(p => `<a href="/?page=${p}">${p}</a>`).join("");
}

loadPages();

/* AUTO SAVE SIMPLE */
editor.addEventListener("input", () => {
  clearTimeout(window.t);
  window.t = setTimeout(saveNow, 800);
});
</script>

</body>
</html>
