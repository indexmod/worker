<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Press is a live wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Old Standard TT', serif;
  background: #fff;
  color: #111;
  display: flex;
}

.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  top: 60px; /* 👈 ВАЖНО: отодвигаем вниз от лого */
  padding: 20px;
  box-sizing: border-box;
}

.sidebar h3 {
  margin: 0 0 10px 0;
  font-size: 12px;
  text-transform: lowercase;
  color: #666;
  font-family: Monaco, monospace;
}

.page-link {
  display: block;
  padding: 6px 0;
  color: #111;
  text-decoration: none;
  font-size: 13px;
  font-family: Monaco, monospace;
}

/* TOP BAR */
.topbar {
  position: fixed;
  left: 240px;
  right: 0;
  top: 0;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 15px;
  background: #fff;
  font-family: Monaco, monospace;
}

/* LOGO */
.logo {
  position: fixed;
  top: 10px;
  left: 10px;
  height: 30px;
  z-index: 10;
}

/* BUTTONS */
button {
  background: #fff;
  border: 0px solid #ddd;
  padding: 6px 10px;
  cursor: pointer;
  font-family: Monaco, monospace;
  text-transform: lowercase;
  font-size: 12px;
}

/* MAIN */
.main {
  margin-left: 240px;
  width: 100%;
  padding-top: 60px;
}

/* EDITOR */
.editor {
  max-width: 800px;
  margin: 60px auto;
  padding: 40px;
  outline: none;
}

/* FIXED TYPOGRAPHY */
.editor h1 {
  font-size: 42px !important;
  margin-bottom: 20px;
  font-weight: normal;
}

.editor p {
  font-size: 18px !important;
  line-height: 1.7;
}

/* REMOVE HR STYLE */
hr {
  display: none;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3></h3>
  <div id="pages">Loading...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <button onclick="newPage()">new page</button>
  <button onclick="saveNow()">save</button>
  <button onclick="saveLocal()">save local</button>
  <button onclick="restoreLocal()">restore</button>
  <span id="status" style="font-size:11px;color:#888;"></span>
</div>

<!-- MAIN -->
<div class="main">
  <div class="editor" contenteditable="true" id="editor"></div>
</div>

<script>
let path = window.location.pathname.split("/").pop() || "home";
const editor = document.getElementById("editor");
const status = document.getElementById("status");

/* LOCAL KEY */
function getLocalKey() {
  return "wiki_backup_" + path;
}

/* CLEAN PASTE */
editor.addEventListener("paste", function(e) {
  e.preventDefault();
  let text = (e.clipboardData || window.clipboardData).getData("text/plain");
  document.execCommand("insertHTML", false, text.replace(/\n/g, "<p></p>"));
});

/* LOAD */
async function loadPage() {
  const res = await fetch(`/api/page/${path}`);
  const text = await res.text();

  if (!text || text.trim() === "") {
    const raw = localStorage.getItem(getLocalKey());
    if (raw) {
      editor.innerHTML = JSON.parse(raw).html;
      status.innerText = "restored local";
      return;
    }
    editor.innerHTML = `<h1>Untitled</h1><p>Start writing...</p>`;
  } else {
    editor.innerHTML = text;
  }
}
loadPage();

/* AUTO SAVE */
let timeout;

editor.addEventListener("input", () => {
  status.innerText = "editing...";

  localStorage.setItem(getLocalKey(), JSON.stringify({
    html: editor.innerHTML,
    time: new Date().toISOString()
  }));

  clearTimeout(timeout);
  timeout = setTimeout(() => saveNow(false), 600);
});

/* SERVER SAVE */
async function saveNow(show = true) {
  await fetch(`/api/page/${path}`, {
    method: "POST",
    body: editor.innerHTML
  });

  if (show) {
    status.innerText = "saved";
    setTimeout(() => status.innerText = "", 1000);
  }
}

/* LOCAL SAVE */
function saveLocal() {
  localStorage.setItem(getLocalKey(), JSON.stringify({
    html: editor.innerHTML,
    time: new Date().toISOString()
  }));

  status.innerText = "saved local";
}

/* RESTORE */
function restoreLocal() {
  const raw = localStorage.getItem(getLocalKey());
  if (!raw) return alert("no backup");

  if (!confirm("restore local version?")) return;

  editor.innerHTML = JSON.parse(raw).html;
  status.innerText = "restored";
}

/* NEW PAGE */
function newPage() {
  const name = prompt("page name:");
  if (!name) return;
  window.location.href = `/${name}`;
}

/* SIDEBAR */
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML = pages.map(p => `
    <a class="page-link" href="/${p}">${p}</a>
  `).join("");
}
loadPages();
</script>

</body>
</html>
