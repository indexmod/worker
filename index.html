<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Press</title>

<link rel="icon" href="/logo.png">
<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="/logo.png">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Old Standard TT', serif;
  background: #fff;
  color: #111;
  display: flex;
}

.logo {
  width: 200px;
  height: auto;
  display: block;

  transform-origin: center;
  animation: pulse 3s ease-in-out infinite;
  will-change: transform;
}

.sidebar {
  width: 240px;
  position: fixed;
  top: 200px;
  padding: 20px;
}

.page-link {
  display: block;
  padding: 6px 0;
  font-size: 13px;
  font-family: monospace;
  color: #111;
  text-decoration: none;
}

.topbar {
  position: fixed;
  left: 240px;
  right: 0;
  top: 0;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 15px;
  background: #fff;
  font-family: monospace;
}

button {
  background: #fff;
  border: none;
  cursor: pointer;
  font-family: monospace;
}

.main {
  margin-left: 240px;
  width: 100%;
  padding-top: 60px;
}

.editor {
  max-width: 800px;
  margin: 60px auto;
  padding: 40px;
  outline: none;
}

.editor h1 { font-size: 40px; }
.editor p { font-size: 18px; line-height: 1.6; }
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="sidebar">
  <div id="pages">Loading...</div>
</div>

<div class="topbar">
  <button onclick="newPage()">New page</button>
  <button onclick="saveNow()">Save</button>
  <button onclick="refresh()">Refresh</button>
  <button onclick="refresh()">Clone</button>
  <button onclick="refresh()">Restor</button>
  <span id="status"></span>
</div>

<div class="main">
  <div class="editor" contenteditable="true" id="editor"></div>
</div>

<script>
let path =
  new URLSearchParams(window.location.search).get("page") ||
  window.location.pathname.split("/").pop() ||
  "home";

const editor = document.getElementById("editor");
const status = document.getElementById("status");

/* META */
function updateMeta() {
  const h1 = editor.querySelector("h1");
  const title = h1 ? h1.innerText : "Indexmod";

  const text = editor.innerText.replace(/\s+/g, " ").trim().slice(0, 140);

  document.title = title;
}

/* LOCAL KEY */
function getLocalKey() {
  return "wiki_" + path;
}

/* LOAD PAGE */
async function loadPage() {
  const res = await fetch("/api/page/" + path);
  const text = await res.text();

  if (!text) {
    const local = localStorage.getItem(getLocalKey());
    editor.innerHTML = local
      ? JSON.parse(local).html
      : "<h1>Untitled</h1><p>Start writing...</p>";
  } else {
    editor.innerHTML = marked.parse(text);
  }

  updateMeta();
}

loadPage();

/* SAVE */
async function saveNow() {
  await fetch("/api/page/" + path, {
    method: "POST",
    body: editor.innerHTML
  });

  status.innerText = "saved";
  setTimeout(() => status.innerText = "", 800);
}

/* AUTOSAVE */
editor.addEventListener("input", () => {
  localStorage.setItem(getLocalKey(), JSON.stringify({
    html: editor.innerHTML
  }));
});

/* NEW PAGE */
function newPage() {
  const name = prompt("page name:");
  if (!name) return;
  window.location.href = "/?page=" + name;
}

/* SIDEBAR */
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML =
    pages.map(p => `<a class="page-link" href="/?page=${p}">${p}</a>`).join("");
}

loadPages();

/* REFRESH */
function refresh() {
  loadPages();
  loadPage();
}
</script>

</body>
</html>
