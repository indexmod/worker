<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Wiki</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #e9e9e9;
  color: #111;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #f4f4f4;
  border-right: 1px solid #ddd;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  position: fixed;
  overflow-y: auto;
}

.sidebar h3 {
  margin-top: 0;
  font-size: 16px;
  color: #333;
}

.page-link {
  display: block;
  padding: 8px 10px;
  margin: 4px 0;
  color: #111;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
}

.page-link:hover {
  background: #ddd;
}

/* EDITOR WRAP */
.main {
  margin-left: 260px;
  width: 100%;
}

/* central "leaf" */
.editor {
  max-width: 800px;
  margin: 40px auto;
  background: #fff;
  padding: 60px 70px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  outline: none;
}

/* title */
h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

/* subtitle */
h2 {
  font-size: 20px;
  font-weight: normal;
  color: #555;
}

/* divider */
hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 30px 0;
}

/* text */
p {
  font-size: 18px;
  line-height: 1.7;
}

/* medium feel */
.editor:focus {
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Pages</h3>
  <div id="pages">Loading...</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="editor" contenteditable="true" id="editor">
    <h1>Title of article</h1>
    <h2>Write subtitle here</h2>
    <hr>
    <p>Start writing your story here...</p>
  </div>
</div>

<script>
const path = window.location.pathname.split("/").pop() || "home";
const editor = document.getElementById("editor");

/* --------------------
   LOAD PAGE CONTENT
---------------------*/
fetch(`/api/page/${path}`)
  .then(r => r.text())
  .then(text => {
    if (text) editor.innerHTML = text;
  });

/* --------------------
   AUTO SAVE
---------------------*/
let timeout;

editor.addEventListener("input", () => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    fetch(`/api/page/${path}`, {
      method: "POST",
      body: editor.innerHTML
    });
  }, 500);
});

/* --------------------
   LOAD SIDEBAR PAGES
---------------------*/
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML = pages.map(p => `
    <a class="page-link" href="/${p}">
      ${p}
    </a>
  `).join("");
}

loadPages();
</script>

</body>
</html>
