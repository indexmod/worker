<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Wiki</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #e9e9e9;
  color: #111;
}

/* центральный "лист" */
.editor {
  max-width: 800px;
  margin: 40px auto;
  background: #fff;
  padding: 60px 70px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  outline: none;
}

/* title */
h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

/* subtitle */
h2 {
  font-size: 20px;
  font-weight: normal;
  color: #555;
}

/* разделитель */
hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 30px 0;
}

/* текст как Medium */
p {
  font-size: 18px;
  line-height: 1.7;
}

/* лёгкий "medium feel" */
.editor:focus {
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}
</style>
</head>

<body>

<div class="editor" contenteditable="true" id="editor">
  <h1>Title of article</h1>
  <h2>Write subtitle here</h2>
  <hr>
  <p>Start writing your story here...</p>
</div>

<script>
const path = window.location.pathname.split("/").pop() || "home";

// загрузка статьи
fetch(`/api/page/${path}`)
  .then(r => r.text())
  .then(text => {
    if (text) document.getElementById("editor").innerHTML = text;
  });

// автосохранение
let timeout;

document.getElementById("editor").addEventListener("input", () => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    fetch(`/api/page/${path}`, {
      method: "POST",
      body: document.getElementById("editor").innerHTML
    });
  }, 500);
});
</script>

</body>
</html>
