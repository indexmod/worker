<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Indexmod</title>
<link rel="icon" href="/logo.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Old Standard TT', serif;
  background: #fff;
  color: #111;
  display: flex;
  align-items: flex-start;
}

.logo {
  position: fixed;
  top: 10px;
  left: 10px;
  height: 150px;
  z-index: 10;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.85; }
  50% { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 0.85; }
}

.sidebar {
  width: 240px;
  position: fixed;
  top: 220px;
  padding: 20px;
  box-sizing: border-box;
}

.page-link {
  display: block;
  padding: 6px 0;
  font-size: 13px;
  font-family: monospace;
  color: #111;
  text-decoration: none;
}

.topbar {
  position: fixed;
  left: 240px;
  right: 0;
  top: 0;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 15px;
  background: #fff;
  font-family: monospace;
  z-index: 5;
}

button {
  background: #fff;
  border: none;
  cursor: pointer;
  font-family: monospace;
}

.main {
  margin-left: 240px;
  width: 100%;
  padding-top: 60px;
}

.editor {
  max-width: 800px;
  margin: 60px auto;
  padding: 40px;
  outline: none;
}

.editor h1 { font-size: 40px; }
.editor p { font-size: 22px; line-height: 1.6; }

#status {
  margin-left: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="sidebar">
  <div id="pages">Loading...</div>
</div>

<div class="topbar">
  <button onclick="newPage()">New page</button>
  <button onclick="saveNow()">Save</button>
  <button onclick="refresh()">Refresh</button>
  <button onclick="clonePage()">Clone</button>
  <button onclick="restorePage()">Restore</button>
  <span id="status"></span>
</div>

<div class="main">
  <div class="editor" contenteditable="true" id="editor"></div>
</div>

<script>
let path = window.location.pathname.split("/").pop() || "home";

const editor = document.getElementById("editor");
const status = document.getElementById("status");

/* -------------------------
   META
--------------------------*/
function updateMeta() {
  const h1 = editor.querySelector("h1");
  document.title = h1 ? h1.innerText : "Indexmod";
}

/* -------------------------
   LOCAL STORAGE KEY
--------------------------*/
function getLocalKey() {
  return "wiki_" + path;
}

/* -------------------------
   LOAD PAGE
--------------------------*/
async function loadPage() {
  const res = await fetch("/api/page/" + path);
  const text = await res.text();

  if (!text) {
    const local = localStorage.getItem(getLocalKey());
    editor.innerHTML = local
      ? JSON.parse(local).html
      : "<h1>Untitled</h1><p>Start writing...</p>";
  } else {
    editor.innerHTML = marked.parse(text);
  }

  updateMeta();
}

loadPage();

/* -------------------------
   SAVE TO SERVER
--------------------------*/
async function saveNow() {
  const res = await fetch("/api/page/" + path, {
    method: "POST",
    body: editor.innerHTML
  });

  const data = await res.json().catch(() => ({}));

  if (data.slug && data.slug !== path) {
    path = data.slug;
    window.history.replaceState({}, "", "/" + path);
  }

  status.innerText = "saved";
  setTimeout(() => status.innerText = "", 800);
}

/* -------------------------
   AUTO SAVE LOCAL
--------------------------*/
editor.addEventListener("input", () => {
  localStorage.setItem(getLocalKey(), JSON.stringify({
    html: editor.innerHTML
  }));
});

/* -------------------------
   NEW PAGE
--------------------------*/
async function newPage() {
  const name = prompt("page name:");
  if (!name) return;

  const html = `<h1>${name}</h1><p>Start writing...</p>`;

  const res = await fetch("/api/page/home", {
    method: "POST",
    body: html
  });

  const data = await res.json();

  window.location.href = "/" + data.slug;
}

/* -------------------------
   CLONE PAGE
--------------------------*/
function clonePage() {
  localStorage.setItem("clone_" + path, editor.innerHTML);
  status.innerText = "cloned";
  setTimeout(() => status.innerText = "", 800);
}

/* -------------------------
   RESTORE PAGE
--------------------------*/
function restorePage() {
  const data = localStorage.getItem("clone_" + path);

  if (!data) {
    alert("No clone found");
    return;
  }

  editor.innerHTML = data;
  status.innerText = "restored";
  setTimeout(() => status.innerText = "", 800);
}

/* -------------------------
   SIDEBAR
--------------------------*/
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML =
    pages.map(p =>
      `<a class="page-link" href="/${p}">${p}</a>`
    ).join("");
}

loadPages();

/* -------------------------
   REFRESH
--------------------------*/
function refresh() {
  loadPages();
  loadPage();
}
</script>

</body>
</html>
