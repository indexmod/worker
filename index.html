<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Press</title>

<link rel="icon" href="/logo.png">

<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="/logo.png">
<meta property="og:type" content="article">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Old Standard TT', serif;
  display: flex;
}

.logo {
  position: fixed;
  top: 10px;
  left: 10px;
  height: 140px;
  z-index: 10;
}

.sidebar {
  width: 240px;
  position: fixed;
  top: 160px;
  padding: 20px;
}

.main {
  margin-left: 240px;
  padding-top: 60px;
  width: 100%;
}

.editor {
  max-width: 800px;
  margin: 60px auto;
  padding: 40px;
  outline: none;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="sidebar">
  <div id="pages">Loading...</div>
</div>

<div class="main">
  <div class="editor" contenteditable="true" id="editor"></div>
</div>

<script>
const editor = document.getElementById("editor");

let path =
  new URLSearchParams(location.search).get("page") ||
  location.pathname.split("/").pop() ||
  "home";

marked.setOptions({ breaks: true, gfm: true });

/* CLEAN LOAD */
async function loadPage() {
  const res = await fetch(`/api/page/${path}`);
  const text = await res.text();

  if (!text || text.trim() === "") {
    editor.innerHTML = "<h1>Untitled</h1><p>Start writing...</p>";
    return;
  }

  editor.innerHTML = marked.parse(text);
  updateMeta();
}

loadPage();

/* META FIX (NO DUPES) */
function updateMeta() {
  const h1 = editor.querySelector("h1");
  const title = h1 ? h1.innerText : "Indexmod";

  const desc = editor.innerText.slice(0, 140);
  const img = editor.querySelector("img")?.src || "/logo.png";

  document.title = title;

  setMeta('meta[name="description"]', desc);
  setMeta('meta[property="og:title"]', title);
  setMeta('meta[property="og:description"]', desc);
  setMeta('meta[property="og:image"]', img);
}

function setMeta(sel, val) {
  const el = document.querySelector(sel);
  if (el) el.setAttribute("content", val);
}

/* INPUT */
editor.addEventListener("input", () => {
  updateMeta();
});

/* SAVE */
async function saveNow() {
  await fetch(`/api/page/${path}`, {
    method: "POST",
    body: editor.innerHTML
  });
}

/* SIDEBAR */
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML =
    pages.map(p => `<a href="/?page=${p}">${p}</a>`).join("");
}

loadPages();
</script>

</body>
</html>
