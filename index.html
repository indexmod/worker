<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod Wiki</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fff;
  color: #111;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  border-right: 1px solid #eee;
  padding: 20px;
  box-sizing: border-box;
  background: #fff;
}

.sidebar h3 {
  margin-top: 0;
  font-size: 14px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #666;
}

/* links */
.page-link {
  display: block;
  padding: 6px 0;
  color: #111;
  text-decoration: none;
  font-size: 14px;
}

.page-link:hover {
  text-decoration: underline;
}

/* MAIN */
.main {
  margin-left: 240px;
  width: 100%;
}

/* EDITOR */
.editor {
  max-width: 800px;
  margin: 60px auto;
  padding: 40px;
  outline: none;
}

/* typography */
h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

h2 {
  font-size: 20px;
  font-weight: normal;
  color: #555;
}

hr {
  border: none;
  border-top: 1px solid #eee;
  margin: 30px 0;
}

p {
  font-size: 18px;
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Pages</h3>
  <div id="pages">Loading...</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="editor" contenteditable="true" id="editor">
    <h1>Title of article</h1>
    <h2>Write subtitle here</h2>
    <hr>
    <p>Start writing your story here...</p>
  </div>
</div>

<script>
const path = window.location.pathname.split("/").pop() || "home";
const editor = document.getElementById("editor");

/* LOAD PAGE */
fetch(`/api/page/${path}`)
  .then(r => r.text())
  .then(text => {
    if (text) editor.innerHTML = text;
  });

/* AUTO SAVE */
let timeout;

editor.addEventListener("input", () => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    fetch(`/api/page/${path}`, {
      method: "POST",
      body: editor.innerHTML
    });
  }, 500);
});

/* LOAD SIDEBAR */
async function loadPages() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("pages").innerHTML = pages.map(p => `
    <a class="page-link" href="/${p}">
      ${p}
    </a>
  `).join("");
}

loadPages();
</script>

</body>
</html>
