<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control</title>
<link rel="icon" href="/logo.png">

<style>
body {
  margin: 0;
  font-family: Monaco, monospace;
  background: #fff;
  color: #111;
  padding: 40px;
}

.logo {
  display: block;
  width: 150px;
  margin-bottom: 30px;
}

.box {
  max-width: 700px;
}

.item {
  padding: 6px 0;
}

button {
  margin-top: 20px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: Monaco, monospace;
}

#status {
  margin-top: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="box">
  <h3>Content control</h3>

  <div id="list">Loading...</div>

  <button onclick="deleteSelected()">delete selected</button>

  <div id="status"></div>
</div>

<script>
let pages = [];

async function loadPages() {
  const res = await fetch("/api/pages");
  pages = await res.json();

  document.getElementById("list").innerHTML = pages.map(p => `
    <div class="item">
      <label>
        <input type="checkbox" value="${p}">
        ${p}
      </label>
    </div>
  `).join("");
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll("input:checked")]
    .map(i => i.value);

  if (!checked.length) {
    document.getElementById("status").innerText = "nothing selected";
    return;
  }

  const res = await fetch("/api/delete", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ slugs: checked })
  });

  const text = await res.text();

  document.getElementById("status").innerText =
    "response: " + text;

  loadPages();
}

loadPages();
</script>

</body>
</html>
