<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control</title>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Old Standard TT', serif;
  background: #fff;
  color: #111;
  padding: 40px;
}

/* LOGO */
.logo {
  display: block;
  width: 200px;
  margin: 0 0 30px 0; /* 👈 left aligned */
  animation: fadeIn 1.2s ease forwards;
}

/* CONTAINER */
.box {
  max-width: 700px;
  margin: 0; /* 👈 left aligned */
}

/* TITLE */
h2 {
  font-family: Monaco, monospace;
  font-size: 14px;
  text-transform: lowercase;
  font-weight: normal;
  margin-bottom: 20px;

  animation: fadeIn 1s ease forwards;
}

/* ITEM LIST */
.item {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* 👈 left aligned */
  gap: 10px;
  padding: 10px 0;
  font-size: 16px;

  opacity: 0;
  transform: translateX(-10px);
  animation: itemIn 0.4s ease forwards;
}

/* stagger animation */
.item:nth-child(1) { animation-delay: 0.05s; }
.item:nth-child(2) { animation-delay: 0.1s; }
.item:nth-child(3) { animation-delay: 0.15s; }
.item:nth-child(4) { animation-delay: 0.2s; }
.item:nth-child(5) { animation-delay: 0.25s; }

/* CHECKBOX */
input[type="checkbox"] {
  transform: scale(1.1);
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 10px 14px;
  background: #fff;
  border: 1px solid #ddd;
  cursor: pointer;
  font-family: Monaco, monospace;
  text-transform: lowercase;

  animation: fadeIn 1.2s ease forwards;
}

button:hover {
  border-color: #111;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes itemIn {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="box">
  <h2>content control</h2>

  <div id="list">Loading...</div>

  <button onclick="deleteSelected()">delete selected</button>
</div>

<script>
let pages = [];

async function loadPages() {
  const res = await fetch("/api/pages");
  pages = await res.json();

  document.getElementById("list").innerHTML = pages.map(p => `
    <div class="item">
      <label>
        <input type="checkbox" value="${p}">
        ${p}
      </label>
    </div>
  `).join("");
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(i => i.value);

  await fetch("/api/delete", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ slugs: checked })
  });

  loadPages();
}

loadPages();
</script>

</body>
</html>
