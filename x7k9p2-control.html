<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  padding: 40px;
}

.item {
  display: flex;
  gap: 10px;
  padding: 5px 0;
}

button {
  margin-top: 20px;
  font-family: monospace;
  background: none;
  border: none;
  cursor: pointer;
}

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Content control</h2>

<div id="list">Loading...</div>

<button onclick="del()">delete selected</button>

<div id="status"></div>

<script>

async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("list").innerHTML =
    pages.map(p => `
      <div class="item">
        <input type="checkbox" value="${p}">
        <span>${p}</span>
      </div>
    `).join("");
}

load();

async function del() {
  const slugs = [...document.querySelectorAll("input:checked")]
    .map(i => i.value);

  await fetch("/api/delete", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ slugs })
  });

  document.getElementById("status").innerText = "deleted";

  load();
}

</script>

</body>
</html>
