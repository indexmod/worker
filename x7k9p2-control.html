<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control</title>
<link rel="icon" href="/logo.png">
<link rel="icon" type="image/png" href="/logo.png">

<style>
body {
  margin: 0;
  font-family: Monaco, monospace;
  background: #fff;
  color: #111;
  padding: 40px;
}

/* LOGO (без анимации тут) */
.logo {
  display: block;
  width: 150px;
  margin: 0 0 30px 0;

  animation: pulse 3s ease-in-out infinite;
  transform-origin: center;
}

@keyframes pulse {
  0%   { transform: scale(1); opacity: 0.85; }
  50%  { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 0.85; }
}

/* CONTAINER */
.box {
  max-width: 700px;
  margin: 0;
}

/* TITLE */
h2 {
  font-size: 13px;
  font-weight: normal;
  margin-bottom: 20px;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  font-size: 14px;
}

/* CHECKBOX */
input[type="checkbox"] {
  transform: scale(1.05);
}

/* BUTTON (без рамки как ты просил) */
button {
  margin-top: 20px;
  padding: 10px 14px;
  background: #fff;
  border: none;           /* 👈 убрана рамка */
  cursor: pointer;
  font-family: Monaco, monospace;
  padding-left: 0;
}

button:hover {
  opacity: 0.6;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="box">
  <h2>Content control</h2>

  <div id="list">Loading...</div>

  <button onclick="deleteSelected()">delete selected</button>
</div>

<script>
let pages = [];

async function loadPages() {
  const res = await fetch("/api/pages");
  pages = await res.json();

  document.getElementById("list").innerHTML = pages.map(p => `
    <div class="item">
      <label>
        <input type="checkbox" value="${p}">
        ${p}
      </label>
    </div>
  `).join("");
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll("input:checked")]
    .map(i => i.value);

  await fetch("/api/delete", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ slugs: checked })
  });

  loadPages();
}

loadPages();
</script>

</body>
</html>
